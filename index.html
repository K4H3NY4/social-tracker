<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #4CAF50;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    select, button {
      padding: 0.5rem;
      margin: 0.5rem 0;
      width: 100%;
      font-size: 1rem;
    }
    .summary {
      margin-top: 1rem;
      padding: 1rem;
      background: #e9f7ef;
      border-left: 5px solid #4CAF50;
      border-radius: 4px;
    }
    h2 {
      color: #333;
    }
    pre {
      background: #f0f0f0;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>

<header>
  <h1>Social Media Performance Dashboard</h1>
</header>

<div class="container">
  <h2>Select Client</h2>
  <select id="clientSelect">
    <option value="">-- Choose a client --</option>
  </select>
  <button onclick="getSummary()">Get 7-Day Summary</button>

  <div class="summary" id="summary" style="display:none;">
    <h2>Summary</h2>
    <p><strong>Instagram Posts:</strong> <span id="igCount">0</span></p>
    <p><strong>TikTok Posts:</strong> <span id="ttCount">0</span></p>
    <h3>AI Summary</h3>
    <pre id="aiSummary"></pre>
  </div>
</div>

<script>
  const API_BASE = "http://127.0.0.1:8000";

  // Fetch all clients on page load
  window.onload = async () => {
    const res = await fetch(`${API_BASE}/clients`);
    const clients = await res.json();
    const select = document.getElementById("clientSelect");
    clients.forEach(client => {
      const option = document.createElement("option");
      option.value = client.name;
      option.text = client.name;
      select.add(option);
    });
  };

  async function getSummary() {
    const clientName = document.getElementById("clientSelect").value;
    if (!clientName) {
      alert("Please select a client.");
      return;
    }

    const res = await fetch(`${API_BASE}/summary/${clientName}/7days`);
    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    document.getElementById("summary").style.display = "block";
    document.getElementById("igCount").textContent = data.summary.instagram_count;
    document.getElementById("ttCount").textContent = data.summary.tiktok_count;
    document.getElementById("aiSummary").textContent = data.summary.ai_summary || "No summary available.";
  }
</script>

</body>
</html>
