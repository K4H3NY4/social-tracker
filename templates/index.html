<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Performance Dashboard</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f4f4f9;
  margin:0;
}

header{
  background:#4CAF50;
  color:white;
  padding:1rem;
  text-align:center;
}

.container{
  max-width:1000px;
  margin:2rem auto;
  background:white;
  padding:2rem;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

select,button{
  padding:0.6rem;
  margin-top:0.5rem;
  width:100%;
  font-size:1rem;
}

button{
  background:#4CAF50;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#45a049;
}

button:disabled{
  background:#aaa;
}

.loading{
  margin-top:1rem;
  font-style:italic;
}

.summary{
  margin-top:2rem;
}

.metrics{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.card{
  background:#f8f8f8;
  padding:15px;
  border-radius:6px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
  margin:0;
  font-size:22px;
  color:#4CAF50;
}

.card p{
  margin:5px 0 0 0;
  color:#555;
}

.ai-box{
  background:#f1f9f3;
  border-left:5px solid #4CAF50;
  padding:1rem;
  border-radius:5px;
}

pre{
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  margin:0;
}

</style>
</head>

<body>

<header>
<h1>Social Media Performance Dashboard</h1>
</header>

<div class="container">

<h2>Select Client</h2>

<select id="clientSelect">
<option value="">Loading clients...</option>
</select>

<button id="summaryBtn">Get 7-Day Summary</button>

<div id="loading" class="loading" style="display:none;">
Loading summary...
</div>

<div id="summary" class="summary" style="display:none;">

<h2>Performance Metrics (Last 7 Days)</h2>

<div class="metrics">

<div class="card">
<h3 id="igTotal">0</h3>
<p>Instagram Posts</p>
</div>

<div class="card">
<h3 id="igVideo">0</h3>
<p>🎥 Video Posts</p>
</div>

<div class="card">
<h3 id="igCarousel">0</h3>
<p>🎠 Carousel Posts</p>
</div>

<div class="card">
<h3 id="igStatic">0</h3>
<p>📷 Static Posts</p>
</div>

<div class="card">
<h3 id="ttTotal">0</h3>
<p>TikTok Videos</p>
</div>

</div>

<h2>AI Performance Summary</h2>

<div class="ai-box">
<pre id="aiSummary"></pre>
</div>

</div>

</div>

<script>

const API_BASE = "http://127.0.0.1:5000";

const clientSelect = document.getElementById("clientSelect");
const summaryBtn = document.getElementById("summaryBtn");
const loading = document.getElementById("loading");
const summaryDiv = document.getElementById("summary");

window.onload = loadClients;

async function loadClients(){

  try{

    const res = await fetch(`${API_BASE}/clients`);

    if(!res.ok) throw new Error("Failed to fetch clients");

    const clients = await res.json();

    clientSelect.innerHTML = '<option value="">-- Choose a client --</option>';

    clients.forEach(client => {

      const option = document.createElement("option");
      option.value = client.name;
      option.textContent = client.name;

      clientSelect.appendChild(option);

    });

  }catch(err){

    console.error(err);
    clientSelect.innerHTML = '<option>Error loading clients</option>';

  }

}

summaryBtn.onclick = getSummary;

async function getSummary(){

  const clientName = clientSelect.value;

  if(!clientName){
    alert("Please select a client.");
    return;
  }

  summaryBtn.disabled = true;
  loading.style.display = "block";
  summaryDiv.style.display = "none";

  try{

    const res = await fetch(
      `${API_BASE}/summary/${encodeURIComponent(clientName)}/7days`
    );

    if(!res.ok) throw new Error("Failed to fetch summary");

    const data = await res.json();

    if(data.error){
      alert(data.error);
      return;
    }

    document.getElementById("igTotal").textContent =
      data.summary.instagram.total;

    document.getElementById("igVideo").textContent =
      data.summary.instagram.video;

    document.getElementById("igCarousel").textContent =
      data.summary.instagram.carousel;

    document.getElementById("igStatic").textContent =
      data.summary.instagram.static;

    document.getElementById("ttTotal").textContent =
      data.summary.tiktok.total;

    document.getElementById("aiSummary").textContent =
      data.summary.ai_summary || "No AI summary available.";

    summaryDiv.style.display = "block";

  }catch(err){

    console.error(err);
    alert("Error retrieving summary.");

  }finally{

    loading.style.display = "none";
    summaryBtn.disabled = false;

  }

}

</script>

</body>
</html>
